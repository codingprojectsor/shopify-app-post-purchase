# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "b79dc024d05942b4be9167561f880fdf"
name = "post-purchase-app"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_metaobject_definitions,write_metaobjects,write_products,write_order_edits,read_orders"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[shop.metafields.app.app_url]
type = "single_line_text_field"
name = "App Backend URL"
description = "The backend URL used by the checkout extension to communicate with the app"

  [shop.metafields.app.app_url.access]
  admin = "merchant_read"
