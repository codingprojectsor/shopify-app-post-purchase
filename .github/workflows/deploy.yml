name: Deploy Post-Purchase App

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postpurchase
          POSTGRES_PASSWORD: PostPurchase@2026
          POSTGRES_DB: post_purchase_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postpurchase"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postpurchase:PostPurchase%402026@localhost:5432/post_purchase_app
      NODE_ENV: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Build app
        run: npm run build

      # ----- Deploy to your server via SSH -----
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/shopify-app-post-purchase

            echo "Pulling latest changes..."
            git pull origin main || git pull upstream main

            echo "Installing dependencies..."
            npm install --production

            echo "Generating Prisma client..."
            npx prisma generate

            echo "Running migrations..."
            npx prisma migrate deploy

            echo "Building app..."
            npm run build

            echo "Restarting app..."
            pm2 restart post-purchase-app || pm2 start npm --name "post-purchase-app" -- run start

            echo "Deploy complete!"
